<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Dementia Detection Framework</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-input::placeholder { color: rgba(255,255,255,0.5) !important; }
        .glass-input { background: rgba(255,255,255,0.05) !important; color: white !important; border-color: rgba(255,255,255,0.2) !important; }
        .glass-input:focus { background: rgba(255,255,255,0.1) !important; border-color: #b58deb !important; box-shadow: 0 0 0 3px rgba(181, 141, 235, 0.2) !important; }
        .glass-group-text { background: rgba(255,255,255,0.05) !important; color: white !important; border-color: rgba(255,255,255,0.2) !important; }
        .glass-container { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); }
    </style>
</head>

<body
    style="display: flex; align-items: center; justify-content: center; background: url('{{ url_for('static', filename='img/neon_brain.png') }}') no-repeat center center fixed; background-size: cover; min-height: 100vh;">
    <div style="position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); z-index: 1;"></div>

    <div class="container animate-fade" style="position: relative; z-index: 2; max-width: 450px;">
        <div class="glass-container p-5">
            <div class="text-center mb-4">
                <i class="fas fa-network-wired fa-3x mb-3" style="color: #b58deb;"></i>
                <h3 class="fw-bold text-white">Join Platform</h3>
            </div>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <div id="authError" class="alert alert-danger d-none"></div>

            <form id="registerForm" action="{{ url_for('register') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold" style="color: rgba(255,255,255,0.85);">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text glass-group-text border-end-0"><i class="fas fa-envelope" style="color: rgba(255,255,255,0.7);"></i></span>
                        <input id="registerEmail" type="email" name="email" class="form-control glass-input border-start-0" required placeholder="Enter email">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold" style="color: rgba(255,255,255,0.85);">Password</label>
                    <div class="input-group">
                        <span class="input-group-text glass-group-text border-end-0"><i class="fas fa-lock" style="color: rgba(255,255,255,0.7);"></i></span>
                        <input id="registerPassword" type="password" name="password" class="form-control glass-input border-start-0" required placeholder="Create password">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold" style="color: rgba(255,255,255,0.85);">Account Type</label>
                    <div class="input-group">
                        <span class="input-group-text glass-group-text border-end-0"><i class="fas fa-user-md" style="color: rgba(255,255,255,0.7);"></i></span>
                        <select id="registerRole" class="form-select glass-input border-start-0 shadow-sm">
                            <option value="patient" style="color: #2d3436;">Patient Profile</option>
                            <option value="clinician" style="color: #2d3436;">Clinician / Doctor</option>
                        </select>
                    </div>
                </div>
                <button id="registerSubmit" type="submit" class="btn btn-premium w-100 py-3 mt-2 fw-bold">Create Data Record</button>
            </form>

            <div class="mt-4 text-center">
                <p style="color: rgba(255,255,255,0.6);">Already configured? <a href="{{ url_for('login') }}" class="fw-bold text-decoration-none" style="color: #b58deb;">Login here</a></p>
            </div>
        </div>
    </div>

    <script>
        window.FIREBASE_WEB_CONFIG = {{ firebase_config | tojson }};
    </script>
    <script type="module" src="{{ url_for('static', filename='firebase-auth.js') }}"></script>
</body>

</html>
